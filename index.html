<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>মারকাজুল আবরার ইসলামিক স্কুল — মাসিক রিপোর্ট</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@500;600;700&family=Hind+Siliguri:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0B1B33;
    --navy-2:#16263F;
    --maroon:#A8412A;
    --maroon-deep:#8a3220;
    --gold:#C79A3E;
    --paper:#FBF7EF;
    --paper-2:#F3ECDD;
    --ink:#1E2430;
    --muted:#6B7280;
    --line:#E4DCC8;
    --good:#2F7D5A;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper-2);
    color:var(--ink);
    font-family:'Hind Siliguri','Noto Serif Bengali',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .bn{font-family:'Hind Siliguri','Noto Serif Bengali',sans-serif;}
  .en{font-family:'Playfair Display',serif;}
  .mono{font-family:'JetBrains Mono',monospace;}

  /* ===== App shell ===== */
  #app{display:flex;min-height:100vh;}
  .sidebar{
    width:280px;flex-shrink:0;
    background:var(--navy);
    color:#EDE7D6;
    padding:26px 18px 18px;
    display:flex;flex-direction:column;
    gap:18px;
  }
  .brand{
    border-bottom:1px solid rgba(237,231,214,.18);
    padding-bottom:16px;
  }
  .brand .logo-img{
    width:52px;
    height:52px;
    border-radius:50%;
    border:2px solid var(--gold);
    object-fit:cover;
    margin-bottom:10px;
    display:block;
  }
  .brand .en{font-size:13px;letter-spacing:.14em;color:#cdbf94;text-transform:uppercase;}
  .brand .bn{font-size:19px;font-weight:700;margin-top:3px;color:#fff;}

  .nav-label{font-size:12px;letter-spacing:.08em;color:#9aa6bb;text-transform:uppercase;margin:4px 0 -6px;}
  .class-list{display:flex;flex-direction:column;gap:6px;}
  .class-item{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 12px;border-radius:10px;cursor:pointer;
    border:1px solid transparent;
    transition:.15s;
  }
  .class-item:hover{background:rgba(237,231,214,.07);}
  .class-item.active{background:var(--maroon);color:#fff;border-color:var(--maroon);}
  .class-item .count{font-size:11px;opacity:.75;font-family:'JetBrains Mono',monospace;}

  .add-class{
    display:flex;gap:6px;margin-top:4px;
  }
  .add-class input{
    flex:1;padding:9px 10px;border-radius:8px;border:1px solid rgba(237,231,214,.25);
    background:rgba(255,255,255,.06);color:#fff;font-size:13px;font-family:inherit;
  }
  .add-class input::placeholder{color:#8a92a5;}
  .add-class button{
    background:var(--gold);color:var(--navy);border:none;border-radius:8px;
    padding:0 13px;font-weight:700;cursor:pointer;font-size:16px;
  }

  .sidebar-foot{margin-top:auto;font-size:11.5px;color:#7f8aa0;line-height:1.6;border-top:1px solid rgba(237,231,214,.15);padding-top:14px;}

  .main{flex:1;min-width:0;padding:30px 34px 70px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
  .topbar h1{font-family:'Playfair Display',serif;font-size:23px;margin:0;color:var(--navy);}
  .topbar .sub{font-size:13.5px;color:var(--muted);margin-top:2px;}
  .btn{
    border:none;border-radius:9px;padding:10px 18px;font-size:14px;font-weight:600;
    cursor:pointer;font-family:'Hind Siliguri',sans-serif;transition:.15s;
  }
  .btn-primary{background:var(--maroon);color:#fff;}
  .btn-primary:hover{background:var(--maroon-deep);}
  .btn-ghost{background:#fff;color:var(--navy);border:1px solid var(--line);}
  .btn-ghost:hover{background:var(--paper-2);}
  .btn-gold{background:var(--gold);color:var(--navy);}

  /* ===== Empty state ===== */
  .empty{
    background:#fff;border:1px dashed var(--line);border-radius:16px;
    padding:60px 30px;text-align:center;color:var(--muted);
  }
  .empty .arch{
    width:64px;height:80px;margin:0 auto 16px;
    border:3px solid var(--gold);border-bottom:none;
    border-radius:50% 50% 0 0/70% 70% 0 0;
  }

  /* ===== Report list cards ===== */
  .report-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;}
  .report-card{
    background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 16px 14px;
    cursor:pointer;transition:.15s;position:relative;
  }
  .report-card:hover{border-color:var(--maroon);box-shadow:0 6px 18px rgba(168,65,42,.10);}
  .report-card .name{font-weight:700;font-size:15.5px;color:var(--navy);}
  .report-card .meta{font-size:12.5px;color:var(--muted);margin-top:3px;}
  .report-card .grade-pill{
    position:absolute;top:14px;right:14px;
    background:var(--paper-2);color:var(--maroon-deep);font-family:'JetBrains Mono',monospace;
    font-weight:700;font-size:12px;padding:3px 9px;border-radius:20px;
  }

  /* ===== Form ===== */
  .panel{background:#fff;border:1px solid var(--line);border-radius:16px;padding:0;overflow:hidden;}
  .section{padding:24px 28px;border-bottom:1px solid var(--line);}
  .section:last-child{border-bottom:none;}
  .section-head{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
  .badge{
    width:30px;height:30px;border-radius:8px;background:var(--maroon);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;
    font-family:'JetBrains Mono',monospace;
  }
  .section-head h2{font-family:'Playfair Display',serif;font-size:18px;margin:0;color:var(--navy);}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  @media(max-width:720px){.grid2,.grid4{grid-template-columns:1fr 1fr;}}

  .field label{display:block;font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
  .field input,.field select,.field textarea{
    width:100%;padding:10px 11px;border:1px solid var(--line);border-radius:9px;
    font-size:14.5px;font-family:'Hind Siliguri',sans-serif;background:var(--paper);color:var(--ink);
  }
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--gold);outline-offset:1px;}
  .field textarea{resize:vertical;min-height:64px;}

  /* subject table */
  .subj-table{width:100%;border-collapse:collapse;}
  .subj-table th{
    text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);
    padding:6px 8px;border-bottom:2px solid var(--line);
  }
  .subj-table td{padding:6px 8px;border-bottom:1px solid var(--line);vertical-align:middle;}
  .subj-table input{width:100%;padding:7px 8px;border:1px solid var(--line);border-radius:7px;font-size:14px;background:var(--paper);}
  .subj-table input.name-input{font-weight:600;background:#fff;}
  .total-cell{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--navy);}
  .grade-cell{font-weight:700;color:var(--maroon-deep);}
  .row-del{background:none;border:none;color:#b94a3a;cursor:pointer;font-size:16px;padding:4px 6px;}
  .add-row{margin-top:10px;font-size:13px;background:none;border:1px dashed var(--line);border-radius:8px;padding:8px 12px;cursor:pointer;color:var(--navy);}

  /* attendance */
  .att-row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;}
  .att-pct{
    margin-left:auto;text-align:center;background:var(--paper-2);border-radius:12px;padding:10px 22px;
  }
  .att-pct .num{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:var(--good);}
  .att-pct .lab{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}

  /* behavior stars */
  .behave-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 30px;}
  @media(max-width:720px){.behave-grid{grid-template-columns:1fr;}}
  .behave-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--paper-2);}
  .behave-row .lbl{font-size:14px;}
  .stars{display:flex;gap:3px;cursor:pointer;}
  .star{font-size:18px;color:#D8D2C0;user-select:none;}
  .star.on{color:var(--gold);}

  /* checklist */
  .check-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 30px;}
  @media(max-width:720px){.check-grid{grid-template-columns:1fr;}}
  .check-row{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:14px;}
  .check-row input{width:17px;height:17px;accent-color:var(--maroon);}

  /* result */
  .result-row{display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;}

  .form-actions{display:flex;justify-content:flex-end;gap:10px;padding:20px 28px;background:var(--paper-2);}

  /* ===== Print / preview ===== */
  .preview-wrap{display:flex;justify-content:center;}
  .sheet{
    width:850px;max-width:100%;background:#fff;border:1px solid var(--line);border-radius:4px;
    box-shadow:0 10px 30px rgba(11,27,51,.08);overflow:hidden;
  }
  .sheet-head{background:var(--navy);color:#fff;padding:26px 32px;position:relative;overflow:hidden;}
  .sheet-head:before{
    content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;
    background:radial-gradient(circle,rgba(199,154,62,.25),transparent 70%);
  }
  .sheet-head .school-en{font-family:'Playfair Display',serif;font-size:23px;letter-spacing:.03em;font-weight:700;}
  .sheet-head .school-bn{font-size:14px;color:#cdbf94;margin-top:2px;}
  .sheet-head .rep-title{margin-top:14px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#a9b4c8;}
  .sheet-meta{display:flex;gap:26px;margin-top:8px;flex-wrap:wrap;}
  .sheet-meta div{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#EDE7D6;}
  .sheet-meta b{color:#fff;}

  .sheet-body{padding:6px 32px 30px;}
  .s-block{padding:18px 0;border-bottom:1px solid var(--line);}
  .s-block:last-child{border-bottom:none;}
  .s-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .s-head .num{width:24px;height:24px;border-radius:6px;background:var(--maroon);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;}
  .s-head h3{font-family:'Playfair Display',serif;font-size:16px;margin:0;color:var(--navy);}

  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 30px;font-size:13.5px;}
  .info-grid .l{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em;}
  .info-grid .v{font-weight:600;margin-top:1px;}

  .att-strip{display:flex;gap:0;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .att-strip>div{flex:1;text-align:center;padding:10px 4px;border-right:1px solid var(--line);}
  .att-strip>div:last-child{border-right:none;background:var(--paper-2);}
  .att-strip .n{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:17px;color:var(--navy);}
  .att-strip .l{font-size:10.5px;color:var(--muted);text-transform:uppercase;}

  table.acad{width:100%;border-collapse:collapse;font-size:13px;}
  table.acad th{text-align:left;font-size:10.5px;text-transform:uppercase;color:var(--muted);padding:6px 6px;border-bottom:2px solid var(--line);}
  table.acad td{padding:7px 6px;border-bottom:1px solid var(--paper-2);}
  table.acad tr td:first-child{font-weight:600;}
  table.acad .tot{font-family:'JetBrains Mono',monospace;font-weight:700;}
  table.acad .gr{font-weight:700;color:var(--maroon-deep);}

  .pv-behave{display:grid;grid-template-columns:1fr 1fr;gap:6px 30px;font-size:13px;}
  .pv-behave .row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dotted var(--paper-2);}
  .pv-stars span{color:var(--gold);letter-spacing:1px;}
  .pv-stars span.off{color:#E2DCC9;}

  .pv-check{display:grid;grid-template-columns:1fr 1fr;gap:6px 30px;font-size:13px;}
  .pv-check .row{display:flex;align-items:center;gap:8px;padding:3px 0;}
  .pv-check .icon{width:15px;color:var(--good);font-weight:700;}
  .pv-check .icon.off{color:#D8D2C0;}

  .pv-remarks{display:grid;grid-template-columns:1fr 1fr;gap:20px;font-size:13.5px;}
  .pv-remarks .l{font-size:11px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
  .pv-remarks .box{background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:10px 12px;min-height:54px;}

  .pv-result{display:flex;align-items:center;gap:16px;}
  .pv-result .grade-badge{
    background:var(--maroon);color:#fff;font-family:'Playfair Display',serif;font-weight:700;
    font-size:22px;padding:10px 22px;border-radius:10px;
  }

  .pv-sign{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-top:10px;text-align:center;}
  .pv-sign .line{border-top:1px solid var(--ink);margin-top:36px;padding-top:6px;font-size:11.5px;color:var(--muted);}

  .preview-actions{display:flex;justify-content:center;gap:10px;margin:18px 0 0;}

  @media print{
    body *{visibility:hidden;}
    .sheet,.sheet *{visibility:visible;}
    .sheet{position:absolute;left:0;top:0;width:100%;box-shadow:none;border:none;}
    .preview-actions,.sidebar,.topbar{display:none !important;}
  }
  @media(max-width:880px){
    #app{flex-direction:column;}
    .sidebar{width:100%;flex-direction:row;flex-wrap:wrap;align-items:center;padding:16px;}
    .brand{border-bottom:none;padding-bottom:0;display:flex;align-items:center;gap:10px;width:100%;}
    .sidebar-foot{display:none;}
    .main{padding:20px 16px 60px;}
    .grid4{grid-template-columns:1fr 1fr;}
  }
</style>
</head>
<body>

<div id="app">
  <aside class="sidebar">
    <div class="brand">
      <img src="image_0a0d37.png" alt="Markazul Abrar Logo" class="logo-img">
      <div class="en">Markazul Abrar</div>
      <div class="bn">ইসলামিক স্কুল</div>
    </div>

    <div class="nav-label bn">শ্রেণিসমূহ</div>
    <div class="class-list" id="classList"></div>
    <div class="add-class">
      <input id="newClassInput" type="text" placeholder="নতুন শ্রেণির নাম (যেমনঃ নুরানি)">
      <button id="addClassBtn">+</button>
    </div>

    <div class="sidebar-foot bn">
      প্রতিটি শ্রেণির জন্য আলাদা শিক্ষার্থী রিপোর্ট সংরক্ষণ ও মুদ্রণ করা যাবে। সকল তথ্য আপনার ব্রাউজারে নিরাপদে সংরক্ষিত থাকে।
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h1 id="mainTitle" class="bn">শ্রেণি নির্বাচন করুন</h1>
        <div class="sub bn" id="mainSub">বাম পাশ থেকে একটি শ্রেণি বাছাই করুন অথবা নতুন শ্রেণি যোগ করুন</div>
      </div>
      <div id="topbarActions"></div>
    </div>

    <div id="viewRoot"></div>
  </main>
</div>

<script>
/* ============= storage helpers ============= */
async function sGet(key){
  try{ const r = await window.storage.get(key, false); return r ? JSON.parse(r.value) : null; }
  catch(e){ return null; }
}
async function sSet(key, val){
  try{ await window.storage.set(key, JSON.stringify(val), false); }catch(e){ console.error('storage set failed', e); }
}
async function sDel(key){
  try{ await window.storage.delete(key, false); }catch(e){}
}

const DEFAULT_SUBJECTS = [
  {name:'কুরআন', ct:0, hw:0, oral:0},
  {name:'আমপারা', ct:0, hw:0, oral:0},
  {name:'কায়দা', ct:0, hw:0, oral:0},
  {name:'বাংলা', ct:0, hw:0, oral:0},
  {name:'ইংরেজি', ct:0, hw:0, oral:0},
  {name:'গণিত', ct:0, hw:0, oral:0},
  {name:'আরবি ভাষা', ct:0, hw:0, oral:0},
  {name:'নূরানী', ct:0, hw:0, oral:0},
  {name:'উচ্চারণ / কথন', ct:0, hw:0, oral:0},
  {name:'আদব', ct:0, hw:0, oral:0},
];
const BEHAVE_ITEMS = [
  'শৃঙ্খলা (Discipline)','সময়ানুবর্তিতা (Punctuality)',
  'অংশগ্রহণ (Participation)','শিক্ষকের প্রতি সম্মান (Respect to Teachers)',
  'দলগত কাজ (Teamwork)','পরিচ্ছন্নতা (Cleanliness)',
  'হোমওয়ার্ক (Homework)','মনোযোগ (Attentiveness)',
  'নিয়মিত নামাজ (Daily Salah)','কুরআন তিলাওয়াত (Quran Recitation)',
  'ইসলামিক আদব (Islamic Adab)','মুখস্থ — হিফজ (Memorization/Hifz)',
];
const CHECK_ITEMS = [
  'সকল হোমওয়ার্ক জমা হয়েছে','সিটি / ক্লাস টেস্ট নেওয়া হয়েছে',
  'সিলেবাস সময়মতো শেষ হয়েছে','কুরআন তিলাওয়াত যাচাই হয়েছে',
  'লেখা যাচাই হয়েছে','অভিভাবকের সাথে যোগাযোগ হয়েছে (প্রয়োজনে)',
  'দুর্বল বিষয় চিহ্নিত হয়েছে','বাড়তি মনোযোগ দেওয়া হয়েছে',
  'গত মাসের অগ্রগতি পর্যালোচনা হয়েছে','ক্লাসে অংশগ্রহণ করে',
  'নামাজের নিয়মিততা যাচাই হয়েছে','আদব ও আচরণ পর্যবেক্ষণ করা হয়েছে',
];

function gradeFromTotal(t){
  if(t>=80) return 'A+';
  if(t>=70) return 'A';
  if(t>=60) return 'A-';
  if(t>=50) return 'B';
  if(t>=40) return 'C';
  if(t>=33) return 'D';
  return 'F';
}
function uid(){ return 'r_'+Date.now()+'_'+Math.random().toString(36).slice(2,8); }
function esc(s){ return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ============= app state ============= */
let CLASSES = [];          // [name,...]
let SUBJECTS_BY_CLASS = {}; // {name: [...]}
let INDEX = [];             // [{id, className, name, roll, month, year, grade}]
let activeClass = null;
let view = 'home'; // home | list | form | preview
let formData = null;
let editingId = null;

async function loadAll(){
  CLASSES = (await sGet('classes')) || [];
  const subjMap = (await sGet('subjects')) || {};
  SUBJECTS_BY_CLASS = subjMap;
  INDEX = (await sGet('report-index')) || [];
  render();
}

async function persistClasses(){ await sSet('classes', CLASSES); }
async function persistSubjects(){ await sSet('subjects', SUBJECTS_BY_CLASS); }
async function persistIndex(){ await sSet('report-index', INDEX); }

/* ============= render: sidebar ============= */
function renderSidebar(){
  const list = document.getElementById('classList');
  if(CLASSES.length===0){
    list.innerHTML = '<div style="font-size:13px;color:#9aa6bb;padding:8px 4px;" class="bn">এখনো কোনো শ্রেণি যোগ করা হয়নি</div>';
    return;
  }
  list.innerHTML = CLASSES.map(c=>{
    const count = INDEX.filter(r=>r.className===c).length;
    return `<div class="class-item ${c===activeClass?'active':''}" data-class="${esc(c)}">
      <span class="bn">${esc(c)}</span><span class="count">${count}</span>
    </div>`;
  }).join('');
  list.querySelectorAll('.class-item').forEach(el=>{
    el.addEventListener('click', ()=>{
      activeClass = el.dataset.class;
      view = 'list';
      render();
    });
  });
}

/* ============= views ============= */
function setTopbar(title, sub, actionsHtml){
  document.getElementById('mainTitle').textContent = title;
  document.getElementById('mainSub').textContent = sub;
  document.getElementById('topbarActions').innerHTML = actionsHtml || '';
}

function render(){
  renderSidebar();
  const root = document.getElementById('viewRoot');

  if(!activeClass){
    setTopbar('শ্রেণি নির্বাচন করুন', 'বাম পাশ থেকে একটি শ্রেণি বাছাই করুন অথবা নতুন শ্রেণি যোগ করুন', '');
    root.innerHTML = `<div class="empty">
      <div class="arch"></div>
      <div class="bn" style="font-size:15px;">শুরু করতে বাম পাশের তালিকা থেকে একটি শ্রেণি যোগ করুন বা নির্বাচন করুন।</div>
    </div>`;
    return;
  }

  if(view==='list'){
    setTopbar(activeClass, 'সংরক্ষিত শিক্ষার্থী রিপোর্টসমূহ',
      `<button class="btn btn-primary bn" id="newReportBtn">+ নতুন রিপোর্ট</button>`);
    const items = INDEX.filter(r=>r.className===activeClass).sort((a,b)=> (b.year-a.year)|| (b.monthIdx-a.monthIdx) || a.name.localeCompare(b.name));
    if(items.length===0){
      root.innerHTML = `<div class="empty">
        <div class="arch"></div>
        <div class="bn" style="font-size:15px;margin-bottom:14px;">এই শ্রেণিতে এখনো কোনো রিপোর্ট তৈরি হয়নি।</div>
        <button class="btn btn-primary bn" id="newReportBtn2">+ প্রথম রিপোর্ট তৈরি করুন</button>
      </div>`;
      document.getElementById('newReportBtn2').addEventListener('click', startNewReport);
    } else {
      root.innerHTML = `<div class="report-grid">${items.map(r=>
        `<div class="report-card" data-id="${r.id}">
          <div class="grade-pill mono">${esc(r.grade||'-')}</div>
          <div class="name bn">${esc(r.name)}</div>
          <div class="meta bn">রোল: ${esc(r.roll)} · ${esc(r.month)} ${r.year}</div>
        </div>`).join('')}</div>`;
      root.querySelectorAll('.report-card').forEach(c=>{
        c.addEventListener('click', ()=> openReport(c.dataset.id));
      });
    }
    document.getElementById('newReportBtn')?.addEventListener('click', startNewReport);
    return;
  }

  if(view==='form'){
    setTopbar(editingId? 'রিপোর্ট সম্পাদনা' : 'নতুন রিপোর্ট', activeClass,
      `<button class="btn btn-ghost bn" id="backToListBtn">← তালিকায় ফিরুন</button>`);
    root.innerHTML = formHtml(formData);
    wireForm();
    document.getElementById('backToListBtn').addEventListener('click', ()=>{ view='list'; render(); });
    return;
  }

  if(view==='preview'){
    setTopbar('রিপোর্ট প্রিভিউ', `${formData.studentName} — ${formData.month} ${formData.year}`,
      `<button class="btn btn-ghost bn" id="backToListBtn2">← তালিকায় ফিরুন</button>`);
    root.innerHTML = previewHtml(formData) + `
      <div class="preview-actions">
        <button class="btn btn-ghost bn" id="editBtn">✎ সম্পাদনা করুন</button>
        <button class="btn btn-gold bn" id="printBtn">🖨️ প্রিন্ট / PDF</button>
        <button class="btn btn-primary bn" style="background:#b94a3a;" id="delBtn">🗑️ মুছে ফেলুন</button>
      </div>`;
    document.getElementById('backToListBtn2').addEventListener('click', ()=>{ view='list'; render(); });
    document.getElementById('editBtn').addEventListener('click', ()=>{ view='form'; render(); });
    document.getElementById('printBtn').addEventListener('click', ()=> window.print());
    document.getElementById('delBtn').addEventListener('click', async ()=>{
      if(confirm('আপনি কি নিশ্চিতভাবে এই রিপোর্টটি মুছে ফেলতে চান?')){
        INDEX = INDEX.filter(r=>r.id!==editingId);
        await persistIndex();
        await sDel('report:'+editingId);
        editingId=null; view='list'; render();
      }
    });
    return;
  }
}

/* ============= new report flow ============= */
async function startNewReport(){
  let subjects = SUBJECTS_BY_CLASS[activeClass];
  if(!subjects){ subjects = JSON.parse(JSON.stringify(DEFAULT_SUBJECTS)); SUBJECTS_BY_CLASS[activeClass]=subjects; await persistSubjects(); }
  const now = new Date();
  const months = ['জানুয়ারি','ফেব্রুয়ারি','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টেম্বর','অক্টোবর','নভেম্বর','ডিসেম্বর'];
  formData = {
    id: null, className: activeClass,
    month: months[now.getMonth()], year: now.getFullYear(), section:'',
    studentName:'', roll:'', fatherName:'', motherName:'', contact:'', teacherName:'',
    totalDays:'', present:'', absent:'', late:'',
    subjects: JSON.parse(JSON.stringify(subjects)).map(s=>({name:s.name,ct:'',hw:'',oral:''})),
    behave: BEHAVE_ITEMS.map(()=>0),
    checks: CHECK_ITEMS.map(()=>false),
    teacherComment:'', improveAreas:'', overallGrade:'A+'
  };
  editingId = null;
  view='form'; render();
}

async function openReport(id){
  const data = await sGet('report:'+id);
  if(!data) return;
  formData = data; editingId = id; view='preview'; render();
}

function starsHtml(val, idx){
  let h = `<div class="stars" data-idx="${idx}">`;
  for(let i=1;i<=5;i++) h += `<span class="star ${i<=val?'on':''}" data-v="${i}">★</span>`;
  h += `</div>`;
  return h;
}

function wireForm(){
  // subjects
  renderSubjRows();
  document.getElementById('addSubjBtn').addEventListener('click', ()=>{
    formData.subjects.push({name:'', ct:'', hw:'', oral:''});
    renderSubjRows();
  });

  // behave
  const bg = document.getElementById('behaveGrid');
  bg.innerHTML = BEHAVE_ITEMS.map((label,i)=>`
    <div class="behave-row">
      <div class="lbl bn">${label}</div>
      ${starsHtml(formData.behave[i], i)}
    </div>`).join('');
  bg.querySelectorAll('.stars').forEach(s=>{
    s.addEventListener('click', (e)=>{
      if(e.target.dataset.v){
        formData.behave[s.dataset.idx] = parseInt(e.target.dataset.v);
        bg.innerHTML = BEHAVE_ITEMS.map((label,i)=>`
          <div class="behave-row"><div class="lbl bn">${label}</div>${starsHtml(formData.behave[i], i)}</div>`).join('');
        wireBehave();
      }
    });
  });
  function wireBehave(){
    document.getElementById('behaveGrid').querySelectorAll('.stars').forEach(s=>{
      s.addEventListener('click',(e)=>{
        if(e.target.dataset.v){
          formData.behave[s.dataset.idx] = parseInt(e.target.dataset.v);
          wireForm(); // re-render simply
        }
      });
    });
  }

  // checklist
  const cg = document.getElementById('checkGrid');
  cg.innerHTML = CHECK_ITEMS.map((label,i)=>`
    <label class="check-row bn"><input type="checkbox" data-idx="${i}" ${formData.checks[i]?'checked':''}> ${label}</label>`).join('');
  cg.querySelectorAll('input').forEach(cb=>{
    cb.addEventListener('change', ()=>{ formData.checks[cb.dataset.idx] = cb.checked; });
  });

  // attendance pct live
  const updatePct = ()=>{
    const t = parseFloat(document.getElementById('f_totalDays').value)||0;
    const p = parseFloat(document.getElementById('f_present').value)||0;
    document.getElementById('attPctDisp').textContent = t>0 ? Math.round((p/t)*100)+'%' : '—';
  };
  ['f_totalDays','f_present'].forEach(id=> document.getElementById(id).addEventListener('input', updatePct));
  updatePct();

  document.getElementById('cancelFormBtn').addEventListener('click', ()=>{ view = editingId? 'preview':'list'; render(); });
  document.getElementById('saveFormBtn').addEventListener('click', saveForm);
}

function renderSubjRows(){
  const body = document.getElementById('subjBody');
  body.innerHTML = formData.subjects.map((s,i)=>{
    const ct=parseFloat(s.ct)||0, hw=parseFloat(s.hw)||0, oral=parseFloat(s.oral)||0;
    const total = ct+hw+oral;
    const grade = (s.ct===''&&s.hw===''&&s.oral==='') ? '—' : gradeFromTotal(total);
    return `<tr data-i="${i}">
      <td><input class="name-input bn" data-f="name" value="${esc(s.name)}" placeholder="বিষয়ের নাম"></td>
      <td><input type="number" data-f="ct" value="${s.ct}"></td>
      <td><input type="number" data-f="hw" value="${s.hw}"></td>
      <td><input type="number" data-f="oral" value="${s.oral}"></td>
      <td class="total-cell">${total||'—'}</td>
      <td class="grade-cell">${grade}</td>
      <td><button class="row-del" data-i="${i}" title="মুছুন">✕</button></td>
    </tr>`;
  }).join('');
  body.querySelectorAll('input').forEach(inp=>{
    inp.addEventListener('input', ()=>{
      const i = inp.closest('tr').dataset.i;
      formData.subjects[i][inp.dataset.f] = inp.value;
      renderSubjRows();
    });
  });
  body.querySelectorAll('.row-del').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      formData.subjects.splice(btn.dataset.i,1);
      renderSubjRows();
    });
  });
}

async function saveForm(){
  formData.month = document.getElementById('f_month').value;
  formData.year = parseInt(document.getElementById('f_year').value)||formData.year;
  formData.section = document.getElementById('f_section').value;
  formData.studentName = document.getElementById('f_studentName').value || 'নামহীন';
  formData.roll = document.getElementById('f_roll').value;
  formData.fatherName = document.getElementById('f_fatherName').value;
  formData.motherName = document.getElementById('f_motherName').value;
  formData.contact = document.getElementById('f_contact').value;
  formData.teacherName = document.getElementById('f_teacherName').value;
  formData.totalDays = document.getElementById('f_totalDays').value;
  formData.present = document.getElementById('f_present').value;
  formData.absent = document.getElementById('f_absent').value;
  formData.late = document.getElementById('f_late').value;
  formData.teacherComment = document.getElementById('f_teacherComment').value;
  formData.improveAreas = document.getElementById('f_improveAreas').value;
  formData.overallGrade = document.getElementById('f_overallGrade').value;

  // persist subject template for class for next time
  SUBJECTS_BY_CLASS[activeClass] = formData.subjects.map(s=>({name:s.name}));
  await persistSubjects();

  const id = editingId || uid();
  formData.id = id;
  await sSet('report:'+id, formData);

  const idxEntry = {
    id, className: activeClass, name: formData.studentName, roll: formData.roll,
    month: formData.month, year: formData.year, monthIdx: ['জানুয়ারি','ফেব্রুয়ারি','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টেম্বর','অক্টোবর','নভেম্বর','ডিসেম্বর'].indexOf(formData.month),
    grade: formData.overallGrade
  };
  INDEX = INDEX.filter(r=>r.id!==id);
  INDEX.push(idxEntry);
  await persistIndex();

  editingId = id;
  view = 'preview';
  render();
}

    </div>

}

/* ============= class add ============= */
document.getElementById('addClassBtn').addEventListener('click', addClassFromInput);
document.getElementById('newClassInput').addEventListener('keydown', e=>{ if(e.key==='Enter') addClassFromInput(); });
async function addClassFromInput(){
  const inp = document.getElementById('newClassInput');
  const name = inp.value.trim();
  if(!name) return;
  if(!CLASSES.includes(name)){
    CLASSES.push(name);
    await persistClasses();
  }
  inp.value='';
  activeClass = name;
  view='list';
  render();
}

loadAll();
</script>
